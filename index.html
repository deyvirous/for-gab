<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for gab</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Set background to Nailong */
            background-image: url('05467adf4f1389383ed62596c6113ca7.jpg'); 
            background-size: cover;
            background-position: center;
            /* Added a slight dark overlay so the yellow container pops against the background */
            background-blend-mode: overlay;
            
            color: #4A3018; 
            font-family: 'Nunito', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; 
            
        }
        
        .container {
            background-color: rgba(253, 225, 113, 0.95); /* Added slight transparency */
            padding: 60px 40px; 
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            
            width: 85%; 
            max-width: 600px; 
            
            border: 4px solid #FFC107;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        
        img {
            width: 220px; 
            border-radius: 20px;
            margin-bottom: 20px;
            transition: transform 0.2s;
            
        }

        .bounce {
            transform: scale(1.1) translateY(-10px);
        }

        h1 { 
            font-size: 32px; 
            margin-top: 0;
            margin-bottom: 15px; 
        }

        #message { 
            font-size: 22px; 
            min-height: 80px; 
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        
        button {
            border: none;
            font-family: inherit;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-weight: bold;
                cursor: pointer;
        }
        
        #yes-btn {
            background-color: #FFC107;
            color: #4A3018;
            padding: 14px 28px;
            font-size: 16px;
            position: relative; 
            z-index: 100;
        }
        #yes-btn:hover { background-color: #FFC107; }
        
        #no-btn {
            background-color: #e5ccb3;
            color: #4A3018;
            padding: 14px 28px;
            font-size: 16px;
        }
        
        #next-btn {
            background-color: #FFC107;
            color: #4A3018;
            padding: 14px 28px;
            font-size: 16px;
            display: none; 
            margin-top: 10px;
        }
        #next-btn:hover { background-color: #FFC107; }

        .confetti {
            position: absolute;
            top: -100px;
            width: 60px; 
            height: auto;
            border-radius: 50%; /* Makes the square Nailong image round for confetti */
            border: 2px solid #FDE171;
            z-index: 1000;
            
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        .floating-heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            z-index: 2000;
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.5);
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-box">
        <!-- Changed main image to Nailong -->
        <img src="1a1d9a334b29684937af2dee7fe40ea1.png" alt="Nailong" id="nailong-img">
        
        <h1 id="title">I'm so sorry baby :(</h1>
        <div id="message">Will you please forgive me?</div>
        
        <div class="btn-container" id="btn-container">
            <button id="yes-btn" onclick="handleYes()">Forgive me :3</button>
            <button id="no-btn" onclick="handleNo()">No</button>
        </div>

        <button id="next-btn" onclick="newMessage()">Read my apologies</button>
    </div>

    <script>
        const nailongImg = document.getElementById('nailong-img');
        
        nailongImg.addEventListener('click', function(e) {
            // Create a heart element
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            heart.innerText = '💛';
            
            // Position it exactly where the mouse clicked
            heart.style.left = (e.clientX - 12) + 'px'; 
            heart.style.top = (e.clientY - 12) + 'px';
            
            // Add it to the screen
            document.body.appendChild(heart);
            
            // talbog nailong
            nailongImg.classList.add('bounce');
            setTimeout(() => { nailongImg.classList.remove('bounce'); }, 200);
            
            setTimeout(() => heart.remove(), 1200);
        });

        let noClickCount = 0;
        let yesFontSize = 16;
        let yesPaddingV = 14;
        let yesPaddingH = 28;

        const noPrompts = [
            "No",
            "Are you sure?",
            "Really sure?",
            "Think again...",
            "Nailong is crying!",
            "Have a heart!",
            "Nailong is sad :(",
            "Please!!!",
            "Okay you're trapped"
        ];

        function handleNo() {
            noClickCount++;
            
            const yesBtn = document.getElementById('yes-btn');
            yesFontSize += 15;
            yesPaddingV += 10;
            yesPaddingH += 20;
            
            yesBtn.style.fontSize = `${yesFontSize}px`;
            yesBtn.style.padding = `${yesPaddingV}px ${yesPaddingH}px`;

            const noBtn = document.getElementById('no-btn');
            noBtn.innerText = noPrompts[Math.min(noClickCount, noPrompts.length - 1)];
            noBtn.style.transform = `scale(${Math.max(0.6, 1 - noClickCount * 0.05)})`;
        }

        // --- CONFETTI LOGIC ---
        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confettiImg = document.createElement('img');
                    // Changed confetti to Nailong
                    confettiImg.src = '20013a1200e8d68.png'; 
                    confettiImg.classList.add('confetti');
                    confettiImg.style.left = Math.random() * 100 + 'vw';
                    confettiImg.style.animationDuration = (Math.random() * 3 + 3) + 's';
                    
                    document.body.appendChild(confettiImg);
                    setTimeout(() => confettiImg.remove(), 6000);
                }, i * 150); 
            }
        }

        function handleYes() {
            document.getElementById('btn-container').style.display = 'none';
            document.getElementById('title').innerText = "Yay! Thank you! Mwamwamwamwa 💛";
            document.getElementById('next-btn').style.display = 'inline-block';
            
            createConfetti();
            newMessage();
        }

        const messages = [
            "I'm really sorry for making you cry :((",
            "I promise to be better and listen to u more, and give u the love u deserve :) ",
            "You mean the world to me.",
            "I hate fighting with my favorite person.",
            "I just want to see you smile again.",
            "I know I messed up, but I'm willing to do whatever it takes to make things right.",
            "I'm here for you, no matter what.",
            "I never want to hurt you again.",
            "I'm so grateful to have you in my life.",
            "I can't imagine my life without you.",
        ];

        function newMessage() {
            const msgDiv = document.getElementById('message');
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            msgDiv.innerText = randomMsg;
        }
    </script>

</body>
</html>
